<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Financeiro</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>


  <!-- FUNDO ANIMADO -->
  <div id="bg1" class="bg"></div>
  <div id="bg2" class="bg"></div>

<div class="container">
<h1>💰 Controle Financeiro</h1>

<!-- CARDS -->
<div class="cards">
<div class="card" onclick="filtrarStatus(null)">Saldo previsto<br><span id="saldo"></span></div>

<div class="card" onclick="filtrarStatus(null)">Saldo real<br><span id="saldoReal"></span></div>

<div class="card" onclick="filtrarStatus('pagar')">A pagar<br><span id="subsaldo"></span></div>

<div class="card" onclick="filtrarStatus('receber')">A receber<br><span id="subreceber"></span></div>
</div>

<!-- INPUT PRINCIPAL -->
<input id="descricao" placeholder="Descrição">
<input id="valor" placeholder="Valor">

<!-- CATEGORIAS -->
<div class="categorias">
 <button onclick="selecionarCategoria(this, 'Mercado')">🛒 Mercado</button>
 <button onclick="selecionarCategoria(this, 'Médico')">💊 Médico</button>
 <button onclick="selecionarCategoria(this, 'Carro')">🚗 Carro</button>
 <button onclick="selecionarCategoria(this, 'Lazer')">🎬 Lazer</button>
 <button onclick="selecionarCategoria(this, 'Casa')">🏠 Casa</button>
 <button onclick="selecionarCategoria(this, 'Escola')">📚 Escola</button>
 <button onclick="selecionarCategoria(this, 'Juros')">💰 Juros</button>
 <button onclick="selecionarCategoria(this, 'Outros')">📦 Outros</button>
</div>

<!-- DATA -->
 
<input type="date" id="mes">


<select id="tipo" onchange="ajustarStatus()">
 <option value="receita">Receita</option>
 <option value="despesa">Despesa</option>
</select>

<select id="status"></select>

<button onclick="adicionar()" id="btnAdd">Adicionar</button>

<hr>

<!-- FILTRO -->
 <label><strong>Filtrar por mês</strong></label><br>
<input type="month" id="filtroMes">

<button onclick="limparFiltros()">🔄 Limpar filtros</button>
<hr>

<canvas id="grafico"></canvas>

<hr>

<table class="tabela">
<thead>
<tr>
<th>Descrição</th>
<th>Valor</th>
<th>Tipo</th>
<th>Categoria</th>
<th>Status</th>
<th>Data</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</div>

<script src="script.js"></script>

</body>
</html>
